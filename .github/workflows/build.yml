name: Build and publish RunPod WanAnimate worker

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runpod/wanimate/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/cubedparadox/wanimate-comfyui-runpod-worker:latest
            ghcr.io/cubedparadox/wanimate-comfyui-runpod-worker:${{ github.sha }}
          build-args: |
            INSTALL_SAGEATTENTION=false
            BAKE_MODELS=false
          labels: |
            org.opencontainers.image.source=https://github.com/cubedparadox/wanimate-comfyui-runpod-worker
            org.opencontainers.image.description=RunPod Serverless ComfyUI worker for Wan 2.2 Animate
